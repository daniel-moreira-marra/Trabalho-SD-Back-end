events {
    # max simultaenous connections per worker
    worker_connections 1024;
}

stream {
    upstream rust_backends {
        server backend1:9000;
        server backend2:9000;
        server backend3:9000;
    }

    server {
        listen 8080;
        proxy_pass rust_backends;

        proxy_connect_timeout 5s;
        proxy_timeout 10m;
    }
}
