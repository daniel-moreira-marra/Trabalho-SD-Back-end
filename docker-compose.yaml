services:
  loadbalancer:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      - backend1
      - backend2
      - backend3

  backend1:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    expose:
      - "9000"
    environment:
      - NODE_ID=1
      - PORT=9000

  backend2:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    expose:
      - "9000"
    environment:
      - NODE_ID=2
      - PORT=9000

  backend3:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    expose:
      - "9000"
    environment:
      - NODE_ID=3
      - PORT=9000